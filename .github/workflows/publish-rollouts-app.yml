name: Publish rollouts-app image
run-name: Publish new image of rollouts-app

on:
  push:
    branches:
      - main
    paths:
      # Per-app path filter — in a multi-app monorepo each app has its own
      # workflow filtered on apps/<app>/**. rollouts-app is self-contained
      # (its own go.mod), so no shared root paths are needed.
      - 'apps/rollouts-app/**'
      - '.github/workflows/publish-rollouts-app.yml'

permissions:
  contents: write   # push the git release tag
  packages: write   # push the image to GHCR

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name and release color
        run: |
          # Derive the image name from the repository so forks need zero
          # workflow edits. GHCR requires lowercase image names.
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}-rollouts-app" >> "$GITHUB_ENV"
          # Release tag contract: <run_number>-<color>, matching ^\d+-[a-z]+$.
          # Color = run number modulo 6 — purely cosmetic, but it makes each
          # release visually distinct in the app UI.
          COLORS=("red" "green" "blue" "yellow" "purple" "orange")
          INDEX=$(( GITHUB_RUN_NUMBER % ${#COLORS[@]} ))
          echo "APP_COLOR=${COLORS[$INDEX]}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        id: push
        with:
          context: apps/rollouts-app
          file: apps/rollouts-app/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            COLOR=${{ env.APP_COLOR }}
          labels: |
            org.opencontainers.image.title="Rollouts App"
            org.opencontainers.image.description="A visualization app for Kubernetes progressive rollouts"
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.run_number }}-${{ env.APP_COLOR }}
            org.opencontainers.image.url=${{ github.repositoryUrl }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.run_number }}-${{ env.APP_COLOR }}

      - name: Tag release in git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "${{ github.run_number }}-${{ env.APP_COLOR }}" -m "Release ${{ github.run_number }}-${{ env.APP_COLOR }}"
          git push origin "${{ github.run_number }}-${{ env.APP_COLOR }}"
